<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông Tin Cá Nhân - Trương Hiếu Nghĩa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600&family=Playfair+Display:italic,wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <!-- Họa tiết trang trí chìm -->
        <div class="zen-circle"></div>
        <div class="zen-circle-2"></div>

        <!-- Bên trái: Ảnh đại diện -->
        <div class="left-side">
            <div class="avatar-container">
                <div class="avatar-placeholder">
                    <!-- Thay link ảnh của bạn vào đây -->
                    <img src="me.jpg" alt="Avatar" class="avatar">
                </div>
                <span class="avatar-label">003123</span>
            </div>

        <!-- Bên phải: Thông tin -->
        <div class="right-side">
            <h1 class="name">Trương Hiếu Nghĩa</h1>
            <p style="color: #95a5a6; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px;">Trợ giảng</p>
            
            <div class="divider"></div>
            
            <div class="info-item">
                <svg class="info-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                <span>0911 971 536</span>
            </div>
            
            <div class="info-item">
                <svg class="info-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                <span>thnghia@ctu.edu.vn</span>
            </div>

            <p class="quote">"Sống tĩnh lặng, làm việc tận tâm."</p>
        </div>
    </div>

</body>
</html>
